        // ============================================================
        // 5. 顯示產品
        // ============================================================
        function renderProducts(filterCategory = 'all', keyword = '') {
            let filtered = products;

            // 分類過濾
            if (filterCategory !== 'all') {
                filtered = filtered.filter(p => p.category === filterCategory);
            }

            // 關鍵字搜尋
            if (keyword.trim() !== '') {
                const kw = keyword.toLowerCase();
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(kw) || 
                    p.name_en.toLowerCase().includes(kw) || 
                    p.name_cn.includes(kw)
                );
            }

            if (filtered.length === 0) {
                productGrid.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:40px; color:#999;">沒有找到相關產品</p>`;
                return;
            }

            let html = '';
            filtered.forEach(p => {
                html += `
                    <div class="card" data-id="${p.id}" data-name="${p.name}" data-category="${p.category}" data-price="${p.price}">
                        <div class="box" style="background:${getColorByCategory(p.category)};"></div>
                        <h4>${p.name}</h4>
                        <p class="product-weight">${p.weight}</p>
                        <p class="product-price">$${p.price}</p>
                        <button class="add-to-cart" data-key="addToCart">加入購物車</button>
                    </div>
                `;
            });
            productGrid.innerHTML = html;

            // 重新綁定加入購物車事件
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const card = this.closest('.card');
                    const id = parseInt(card.dataset.id);
                    const name = card.dataset.name;
                    const price = parseInt(card.dataset.price);

                    const existing = cart.find(item => item.id === id);
                    if (existing) {
                        existing.qty += 1;
                    } else {
                        cart.push({ id, name, price, qty: 1 });
                    }

                    updateCartUI();
                    showTemporaryMessage(`${translations[currentLang].toastAdded} ${name}`);
                });
            });
        }

        function getColorByCategory(category) {
            const colors = {
                'biscuit': '#f9d56e',
                'chip': '#f5b895',
                'chocolate': '#c9b1a0',
                'other': '#9fd9b2',
                'drink': '#7ec8e3'
            };
            return colors[category] || '#ddd';
        }

            currentLang = lang;
            const t = translations[lang];

            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (t[key] !== undefined) {
                    if (el.tagName === 'INPUT' && key === 'searchPlaceholder') {
                        el.placeholder = t[key];
                    } else {
                        el.textContent = t[key];
                    }
                }
            });

            document.getElementById('cartLabel').textContent = t.cartLabel;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            // 重新顯示產品（更新「加入購物車」文字）
            renderProducts(currentCategory, currentKeyword);
        }

        // ============================================================
        // 7. 購物車功能
        // ============================================================
        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            cartCount.textContent = totalItems;
            renderCartItems();

            const totalPrice = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
            cartTotal.textContent = `$${totalPrice}`;
        }

        function renderCartItems() {
            const t = translations[currentLang];

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="empty-cart">${t.emptyCart}</p>`;
                return;
            }

            let html = '';
            cart.forEach((item, index) => {
                html += `
                    <div class="cart-item">
                        <span class="cart-item-name">${item.name}</span>
                        <div class="cart-item-controls">
                            <button class="qty-btn" data-index="${index}" data-action="decrease">−</button>
                            <span class="cart-item-qty">${item.qty}</span>
                            <button class="qty-btn" data-index="${index}" data-action="increase">+</button>
                            <button class="cart-item-remove" data-index="${index}">✕</button>
                        </div>
                        <span class="cart-item-price">$${item.price * item.qty}</span>
                    </div>
                `;
            });
            cartItemsContainer.innerHTML = html;

            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    const action = this.dataset.action;
                    if (action === 'increase') {
                        cart[index].qty += 1;
                    } else if (action === 'decrease') {
                        cart[index].qty -= 1;
                        if (cart[index].qty <= 0) {
                            cart.splice(index, 1);
                        }
                    }
                    updateCartUI();
                });
            });

            document.querySelectorAll('.cart-item-remove').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    cart.splice(index, 1);
                    updateCartUI();
                });
            });
        }

        // ============================================================
        // 8. 側欄開關
        // ============================================================
        cartToggle.addEventListener('click', () => {
            cartSidebar.classList.add('open');
            cartOverlay.classList.add('show');
            renderCartItems();
        });

        function closeCart() {
            cartSidebar.classList.remove('open');
            cartOverlay.classList.remove('show');
        }

        closeCartBtn.addEventListener('click', closeCart);
        cartOverlay.addEventListener('click', closeCart);

        // ============================================================
        // 9. 清空 & 結帳
        // ============================================================
        clearCartBtn.addEventListener('click', () => {
            if (cart.length === 0) return;
            if (confirm(translations[currentLang].toastClearConfirm)) {
                cart = [];
                updateCartUI();
            }
        });

        checkoutBtn.addEventListener('click', () => {
            const t = translations[currentLang];
            if (cart.length === 0) {
                alert(t.toastEmpty);
                return;
            }
            alert(t.toastCheckout);
        });

        // ============================================================
        // 10. 搜尋 & 分類過濾
        // ============================================================
        let currentCategory = 'all';
        let currentKeyword = '';

        const searchInput = document.getElementById('productSearch');
        const msg = document.getElementById('searchResultMsg');

        function filterProducts() {
            currentKeyword = searchInput.value.trim();
            renderProducts(currentCategory, currentKeyword);
            const total = document.querySelectorAll('.card').length;
            msg.textContent = currentKeyword !== '' ? `🔍 ${translations[currentLang].searchBtn}：${total} ${currentLang === 'en' ? 'items found' : '件相關商品'}` : '';
        }

        searchInput.addEventListener('input', filterProducts);
        document.getElementById('searchBtn').addEventListener('click', filterProducts);

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                currentCategory = this.dataset.category;
                searchInput.value = '';
                msg.textContent = '';
                renderProducts(currentCategory, '');
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // ============================================================
        // 11. Toast 提示
        // ============================================================
        function showTemporaryMessage(text) {
            let el = document.createElement('div');
            el.className = 'toast-msg';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => {
                el.remove();
            }, 1800);
        }

        // ============================================================
        // 12. 語言按鈕事件
        // ============================================================
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                switchLanguage(this.dataset.lang);
            });
        });

        // ============================================================
        // 13. 初始化
        // ============================================================
        switchLanguage('zh-HK');
        renderProducts('all', '');
        updateCartUI();
    </script>
</body>
</html>
